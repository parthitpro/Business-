{% extends "base.html" %}

{% block title %}{{ 'Edit' if order else 'Create' }} Order - Khakhra Business{% endblock %}

{% block extra_css %}
<style>
    .order-item-row { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
</style>
{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-header bg-white">
        <h5 class="mb-0">{{ '✏️ Edit' if order else '➕ Create' }} Order</h5>
    </div>
    <div class="card-body">
        <form method="POST" id="orderForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token else '' }}">
            
            <!-- Customer & Order Type -->
            <div class="row mb-4">
                <div class="col-md-6">
                    <label for="customer_id" class="form-label">Customer *</label>
                    <select class="form-select" id="customer_id" name="customer_id" required>
                        <option value="">Select Customer...</option>
                        {% for customer in customers %}
                        <option value="{{ customer.id }}" 
                                {% if order and order.customer_id == customer.id %}selected{% endif %}>
                            {{ customer.name }} ({{ customer.phone }})
                        </option>
                        {% endfor %}
                    </select>
                    <small class="text-muted">
                        <a href="{{ url_for('customers.add_customer') }}" target="_blank">+ Add New Customer</a>
                    </small>
                </div>
                
                <div class="col-md-6">
                    <label class="form-label">Order Type *</label>
                    <div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="order_type" 
                                   id="retail" value="retail" 
                                   {% if not order or order.order_type.value == 'retail' %}checked{% endif %}>
                            <label class="form-check-label" for="retail">Retail</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="order_type" 
                                   id="wholesale" value="wholesale"
                                   {% if order and order.order_type.value == 'wholesale' %}checked{% endif %}>
                            <label class="form-check-label" for="wholesale">Wholesale</label>
                        </div>
                    </div>
                </div>
            </div>
            
            <hr>
            
            <!-- Order Items -->
            <h6 class="mb-3">Order Items</h6>
            <div id="itemsContainer">
                <!-- Items will be added here dynamically -->
            </div>
            
            <button type="button" class="btn btn-outline-primary mb-3" onclick="addItem()">
                ➕ Add Item
            </button>
            
            <!-- Grand Total -->
            <div class="alert alert-success">
                <div class="d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Grand Total:</h5>
                    <h3 class="mb-0">₹<span id="grandTotal">0.00</span></h3>
                </div>
            </div>
            
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg">
                    {{ 'Update' if order else 'Create' }} Order
                </button>
                <a href="{{ url_for('orders.list_orders') }}" class="btn btn-outline-secondary">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<script>
let itemCount = 0;
const products = {{ products|tojson }};

// Build product options for dropdowns
function getProductOptions(selectedId = '') {
    let options = '<option value="">Select Product...</option>';
    products.forEach(p => {
        const selected = p.id == selectedId ? 'selected' : '';
        options += `<option value="${p.id}" ${selected}>${p.name}</option>`;
    });
    return options;
}

function addItem(variantId = '', quantity = 1, price = 0) {
    itemCount++;
    const container = document.getElementById('itemsContainer');
    
    const row = document.createElement('div');
    row.className = 'order-item-row';
    row.innerHTML = `
        <div class="row g-2 align-items-end">
            <div class="col-md-3">
                <label class="form-label">Product</label>
                <select class="form-select product-select" onchange="loadVariants(this)" required>
                    ${getProductOptions()}
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Weight</label>
                <select class="form-select variant-select" onchange="updatePrice(this)" required>
                    <option value="">Select Weight...</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Quantity</label>
                <input type="number" class="form-control quantity-input" value="${quantity}" min="1" onchange="calculateSubtotal(this)" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">Price (Editable)</label>
                <input type="number" step="0.01" class="form-control price-input" value="${price}" min="0" onchange="calculateSubtotal(this)" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">Subtotal</label>
                <input type="text" class="form-control subtotal-display" value="0.00" readonly>
            </div>
            <div class="col-md-1">
                <button type="button" class="btn btn-outline-danger" onclick="removeItem(this)">🗑️</button>
            </div>
        </div>
        <input type="hidden" name="product_variant_id[]" class="variant-id-input" value="${variantId}">
        <input type="hidden" name="quantity[]" class="quantity-hidden" value="${quantity}">
        <input type="hidden" name="price[]" class="price-hidden" value="${price}">
    `;
    
    container.appendChild(row);
    
    // If editing, load the variant data
    if (variantId) {
        // Will be populated from existing order data
    }
}

function removeItem(button) {
    const row = button.closest('.order-item-row');
    row.remove();
    calculateGrandTotal();
}

function loadVariants(select) {
    const row = select.closest('.row');
    const productId = select.value;
    const variantSelect = row.querySelector('.variant-select');
    const orderType = document.querySelector('input[name="order_type"]:checked').value;
    
    if (!productId) {
        variantSelect.innerHTML = '<option value="">Select Weight...</option>';
        return;
    }
    
    // Fetch variants via AJAX (offline - uses internal route)
    fetch(`/orders/api/variants/${productId}?order_type=${orderType}`)
        .then(response => response.json())
        .then(data => {
            let options = '<option value="">Select Weight...</option>';
            data.forEach(v => {
                options += `<option value="${v.id}" data-price="${v.price}">${v.weight_label}</option>`;
            });
            variantSelect.innerHTML = options;
        });
}

function updatePrice(select) {
    const row = select.closest('.row');
    const option = select.options[select.selectedIndex];
    const price = option.getAttribute('data-price') || 0;
    const priceInput = row.querySelector('.price-input');
    const variantIdInput = row.querySelector('.variant-id-input');
    
    priceInput.value = price;
    variantIdInput.value = select.value;
    
    calculateSubtotal(priceInput);
}

function calculateSubtotal(input) {
    const row = input.closest('.row');
    const quantity = parseFloat(row.querySelector('.quantity-input').value) || 0;
    const price = parseFloat(row.querySelector('.price-input').value) || 0;
    const subtotal = quantity * price;
    
    row.querySelector('.subtotal-display').value = subtotal.toFixed(2);
    row.querySelector('.quantity-hidden').value = quantity;
    row.querySelector('.price-hidden').value = price;
    
    calculateGrandTotal();
}

function calculateGrandTotal() {
    let total = 0;
    document.querySelectorAll('.subtotal-display').forEach(input => {
        total += parseFloat(input.value) || 0;
    });
    document.getElementById('grandTotal').textContent = total.toFixed(2);
}

// Initialize form
document.addEventListener('DOMContentLoaded', function() {
    {% if order and order.items %}
    // Load existing items for edit
    const existingItems = [
        {% for item in order.items %}
        {
            variantId: {{ item.product_variant_id }},
            quantity: {{ item.quantity }},
            price: {{ item.price_at_time }}
        }{% if not loop.last %},{% endif %}
        {% endfor %}
    ];
    
    existingItems.forEach(item => {
        addItem(item.variantId, item.quantity, item.price);
        // Note: Variant details would need to be loaded separately
    });
    {% else %}
    // Add one empty item row by default
    addItem();
    {% endif %}
    
    calculateGrandTotal();
});

// Update prices when order type changes
document.querySelectorAll('input[name="order_type"]').forEach(radio => {
    radio.addEventListener('change', function() {
        document.querySelectorAll('.product-select').forEach(select => {
            if (select.value) loadVariants(select);
        });
    });
});
</script>
{% endblock %}
